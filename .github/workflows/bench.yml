name: benchmark

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      n:
        description: "Number of simulations (N) per variant"
        default: "5000"
        required: false

# One PARALLEL job per Agent-1 variant (fixes the single-job timeout: 6 x N=5000 sequentially
# exceeded 5.5h; each variant alone is ~15 min). Only the promising remainder after the N=5000
# result -- strong07 (baseline) + the stochastic-raise + value-floor families. The aggression
# sweep is dropped (it lost decisively at N=5000). VC_VARIANT / N / SLUG go via env (never inlined
# into run:) so a crafted workflow_dispatch input can't inject shell.
jobs:
  variants:
    name: "variant: ${{ matrix.slug }}"
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - {slug: strong07,      key: "strong07(shipped)"}
          - {slug: vfloor05,      key: "valuefloor C=0.5"}
          - {slug: vfloor06,      key: "valuefloor C=0.6"}
          - {slug: vfloor07,      key: "valuefloor C=0.7"}
          - {slug: stoch-floor04, key: "stochraise FLOOR0.4"}
          - {slug: stoch-floor08, key: "stochraise FLOOR0.8"}
          - {slug: stoch-floor09, key: "stochraise FLOOR0.9"}
          - {slug: stoch-floor10, key: "stochraise FLOOR1.0"}
          - {slug: stoch-slot2,   key: "stochraise slot2"}
          - {slug: slot2-floor09, key: "slot2 FLOOR0.9"}
    env:
      N: ${{ github.event.inputs.n || '5000' }}
      VC_VARIANT: ${{ matrix.key }}
      SLUG: ${{ matrix.slug }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run one variant
        run: |
          N_SAFE="$(printf '%s' "$N" | tr -cd '0-9')"; N_SAFE="${N_SAFE:-5000}"
          SLUG_SAFE="$(printf '%s' "$SLUG" | tr -cd 'a-z0-9-')"; SLUG_SAFE="${SLUG_SAFE:-variant}"
          echo "== variant '$VC_VARIANT'  N=$N_SAFE =="
          PYTHONPATH=src python harness/benchmark_variants.py "$N_SAFE" | tee "variant_${SLUG_SAFE}_N${N_SAFE}.txt"
      - uses: actions/upload-artifact@v4
        with:
          name: variant-${{ matrix.slug }}
          path: variant_*.txt
